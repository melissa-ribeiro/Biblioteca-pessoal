<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca Pessoal - Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/cadastro.css">
</head>

<body>
  <header class="header">
    <div class="logo">
      <!-- IMAGEM -->
      <img src="./imagens/img1.png" alt="Logo">

      <!-- BIBLIOTECA PESSOAL -->
      <span>BIBLIOTECA PESSOAL</span>
    </div>
    <!-- BOTÃO VOLTAR -->
    <div class="back">
      <a href="./index.html">
        <button>Início</button>
      </a>
    </div>
  </header>

  <div class="principal">

    <div class="container">
      <span>Faça seu cadastro:</span>
      <div class="dados">
        Nome: <br>
        <input id="ipt_nome" type="text" placeholder="Digite seu nome"> <br>
        Email: <br>
        <input id="ipt_email" type="text" placeholder="Digite seu Email"> <br>
        Crie uma senha: <br>
        <input id="ipt_senha" type="text" placeholder="Digite uma senha"> <br>
        Qual sua meta de leitura semanal? <br>
        <input id="ipt_meta" type="number" placeholder="Digite sua meta em dias"> <br><br>

        <button onclick="Cadastrar()" id="bntCadastrar">Cadastrar</button>
        <div id="cardErro" style="display: none;">

        </div>
        <div class="login">
          <span>Já faz parte?</span>
          <a href="./login.html">
            <span>Entre</span>
          </a>


        </div>


      </div>
    </div>

  </div>


</body>

</html>
<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function Cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = ipt_nome.value;
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;
    var metaVar = ipt_meta.value;



    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      metaVar == ""
    ) {

      alert("Preencha todos os campos corretamente!");
    } else if (
      nomeVar.length == 0 || nomeVar.length < 3
    ) {
     
      alert("Insira seu nome corretamente.")

    } else if (
      emailVar.length == 0 || emailVar.length < 3 || !emailVar.includes('@')
    ) {
      
      alert("Insira seu email corretamente.")
    } else if (
      senhaVar.length < 6
    ) {
    
      alert("Crie uma senha com 6 digitos ou mais.")
    } else if (
      metaVar <= 0 || metaVar > 7
    ) {
     
      alert("Insira a quantidade de dias que você quer ler por semana.")
    } else {

      // Enviando o valor da nova input
      fetch("/usuarios/cadastrar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          // crie um atributo que recebe o valor recuperado aqui
          // Agora vá para o arquivo routes/usuario.js
          nomeServer: nomeVar,
          emailServer: emailVar,
          senhaServer: senhaVar,
          metaServer: metaVar
        }),
      })
        .then(function (resposta) {
          console.log("resposta: ", resposta);
  
          if (resposta.ok) {
            

            alert("Cadastro realizado com sucesso!");
  
            setTimeout(() => {
              window.location = "./login.html";
            }, "2000");
  
          } else {
            throw "Houve um erro ao tentar realizar o cadastro!";
          }
        })
        .catch(function (resposta) {
          console.log(`#ERRO: ${resposta}`);
  
        });
  
      return false;
    }
    }



</script>
