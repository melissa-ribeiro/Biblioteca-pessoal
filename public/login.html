    <!DOCTYPE html>
    <html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BIblioteca Pessoal - Login</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./css/login.css">
    </head>

    <body>

        <body>
            <header class="header">
                <div class="logo">
                    <!-- IMAGEM -->
                    <img src="./imagens/img1.png" alt="Logo">

                    <!-- BIBLIOTECA PESSOAL -->
                    <span>BIBLIOTECA PESSOAL</span>
                </div>
                <!-- BOTÃO VOLTAR -->
                <div class="back">
                    <a href="./index.html">
                        <button>Início</button>
                    </a>
                </div>
            </header>

            <div class="principal">

                <div class="container">
                    <span>Realize seu login:</span>
                    <div class="dados">
                        Email: <br>
                        <input id="ipt_email" type="text" placeholder="Digite seu Email"> <br>
                        Senha: <br>
                        <input id="ipt_senha" type="text" placeholder="Digite sua senha"> <br>

                        <button id="bntEntrar" onclick="Login()">Entrar</button>

                        <div class="login">
                            <span>Ainda não faz parte?</span>
                            <a href="./cadastro.html">
                                <span>Cadastre-se</span>
                            </a>


                        </div>


                    </div>
                </div>
        </body>

    </html>

<script>


    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
