<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIblioteca Pessoal - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/login.css">
</head>


<body>
    <header class="header">
        <div class="logo">
            <!-- IMAGEM -->
            <img src="./imagens/img1.png" alt="Logo">

            <!-- BIBLIOTECA PESSOAL -->
            <span>BIBLIOTECA PESSOAL</span>
        </div>
        <!-- BOTÃO VOLTAR -->
        <div class="back">
            <a href="./index.html">
                <button>Início</button>
            </a>
        </div>
    </header>

    <div class="principal">

        <div class="container">
            <span>Realize seu login:</span>
            <div class="dados">
                Email: <br>
                <input id="ipt_email" type="text" placeholder="Digite seu Email"> <br>
                Senha: <br>
                <div class="senha-container">
                    <input id="ipt_senha" type="password" placeholder="Digite uma senha">
                    <button type="button" id="btnSenha" class="btn-olho" onclick="mostrarSenha()">
                        Mostrar
                    </button>
                </div><br>

                <button id="bntEntrar" onclick="Login()">Entrar</button> <br>
            </div>


            <div class="login">
                <span>Ainda não faz parte?</span>
                <a href="./cadastro.html">
                    <span>Cadastre-se</span>
                </a>
            </div>

        </div>
    </div>
</body>

</html>

<script>

    var tentativas = 0;

    function Login() {

        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;


        if (emailVar == "" || senhaVar == "") {
            alert("Preencha todos o campos")
            return false;
        }
        else {

            console.log("FORM LOGIN: ", emailVar);
            console.log("FORM SENHA: ", senhaVar);

            fetch("/usuarios/autenticar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    emailServer: emailVar,
                    senhaServer: senhaVar
                })
            }).then(function (resposta) {
                console.log("ESTOU NO THEN DO Login()!")

                if (resposta.ok) {
                    console.log(resposta);

                    resposta.json().then(json => {
                        console.log(json);
                        console.log(JSON.stringify(json));
                        sessionStorage.EMAIL_USUARIO = json.email;
                        sessionStorage.NOME_USUARIO = json.nome;
                        sessionStorage.ID_USUARIO = json.id_usuario;
                        sessionStorage.PRIMEIRO_ACESSO = json.primeiro_acesso;
                        sessionStorage.NICKNAME_USUARIO = json.nickname;
                        sessionStorage.PRONOME_USUARIO = json.pronome;
                        sessionStorage.AVATAR_USUARIO = json.avatar;

                        setTimeout(function () {
                            if (json.primeiro_acesso == 1) {

                                window.location = "./boasVindas.html";

                            } else {

                                window.location = "./menu.html";

                            }

                        });

                    });


                } else {

                    tentativas++;

                    console.log("Houve um erro ao tentar realizar o login!");

                    resposta.text().then(texto => {

                        alert(`Email ou senha inválidos! Tentativa ${tentativas}/3`);
                        console.log(texto);

                        if (tentativas >= 3) {

                            bntEntrar.disabled = true;
                            bntEntrar.innerHTML = "Bloqueado";

                            alert("Número máximo de tentativas atingido!");
                        }

                    }).catch(function (erro) {
                        console.log(erro);
                    })

                    return false;

                }

            }); // FECHA O .then DO FETCH
        } // FECHA O else DO LOGIN
    } // FECHA A FUNÇÃO Login()

    function mostrarSenha() {
                    if (ipt_senha.type == "password") {

                        ipt_senha.type = "text";
                        btnSenha.innerHTML = "Ocultar";

                    } else {

                        ipt_senha.type = "password";
                        btnSenha.innerHTML = "Mostrar";

                    }
                }

</script>
