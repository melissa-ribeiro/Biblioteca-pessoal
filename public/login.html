    <!DOCTYPE html>
    <html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BIblioteca Pessoal - Login</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="login.css">
    </head>

    <body>

        <body>
            <header class="header">
                <div class="logo">
                    <!-- IMAGEM -->
                    <img src="../imagens/img1.png" alt="Logo">

                    <!-- BIBLIOTECA PESSOAL -->
                    <span>BIBLIOTECA PESSOAL</span>
                </div>
                <!-- BOTÃO VOLTAR -->
                <div class="back">
                    <a href="../Home/index.html">
                        <button>Home</button>
                    </a>
                </div>
            </header>

            <div class="principal">

                <div class="container">
                    <span>Realize seu login:</span>
                    <div class="dados">
                        Email: <br>
                        <input id="ipt_email" type="text" placeholder="Digite seu Email"> <br>
                        Senha: <br>
                        <input id="ipt_senha" type="text" placeholder="Digite sua senha"> <br>

                        <button id="bntEntrar" onclick="Login()">Entrar</button>

                        <div class="login">
                            <span>Ainda não faz parte?</span>
                            <a href="../tela cadastro/cadastro.html">
                                <span>Cadastre-se</span>
                            </a>


                        </div>


                    </div>
                </div>
        </body>

    </html>
    <script>
        let tentativas = 0

        function Login() {
            let email = ipt_email.value
            let senha = ipt_senha.value
            let encontrou = false
            

            if (ipt_email.value == '' || ipt_senha.value == '') {
                alert("Insira email e senha.")
            } else if (!email.includes('@')) {
                alert("Insira o email corretamente.")
            } else if (senha.length < 6) {
                alert("Insira a senha corretamente")
            } else {
                
                let cadastro = JSON.parse(localStorage.getItem("cadastro")) || []

                for (let i = 0; i < cadastro.length; i ++){

                    if(cadastro[i].email == email && cadastro[i].senha == senha){
                        encontrou = true
                        break 
                    }
                }

                if(encontrou){
                    alert("Login realizado com sucesso!")
                    window.location.href = "../menu principal/menu.html"

                    localStorage.setItem("userEncontrado",email)
                }else {

                    alert("Email ou senha incorretos")

                     tentativas++
                    if (tentativas >= 3) {
                    bntEntrar.disabled = true
                    alert("Você excedeu o limite de tentativas")
                   
                } 
                }

            }
        }
    </script>
